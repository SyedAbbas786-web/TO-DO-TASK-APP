<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Touch Panel Diagnostic</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #121212; font-family: sans-serif; }
        #grid-container { display: grid; width: 100vw; height: 100vh; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(10, 1fr); }
        .tile { border: 0.5px solid #333; transition: background 0.1s; }
        .active { background: #4CAF50 !important; border: none; }
        #stats { position: fixed; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="stats">Coverage: <span id="percent">0</span>%</div>
    <div id="grid-container"></div>

    <script>
        const container = document.getElementById('grid-container');
        const percentLabel = document.getElementById('percent');
        const totalTiles = 100;
        let activatedCount = 0;

        // Create 10x10 Grid
        for (let i = 0; i < totalTiles; i++) {
            const tile = document.createElement('div');
            tile.classList.add('tile');
            container.appendChild(tile);
        }

        const tiles = document.querySelectorAll('.tile');

        function handleTouch(e) {
            e.preventDefault();
            // Support both mouse and touch
            const touches = e.touches || [e];
            
            for (let i = 0; i < touches.length; i++) {
                const x = touches[i].clientX;
                const y = touches[i].clientY;
                const element = document.elementFromPoint(x, y);

                if (element && element.classList.contains('tile') && !element.classList.contains('active')) {
                    element.classList.add('active');
                    activatedCount++;
                    updateReport(); 
                }
            }
        }

        function updateReport() {
            const score = Math.round((activatedCount / totalTiles) * 100);
            percentLabel.innerText = score;
            if (score === 100) {
                percentLabel.innerHTML = "100% - PANEL HEALTHY";
                percentLabel.style.color = "#4CAF50";
            }
        }

        // Event Listeners
        container.addEventListener('touchstart', handleTouch);
        container.addEventListener('touchmove', handleTouch);
        container.addEventListener('mousemove', (e) => { if(e.buttons === 1) handleTouch(e); });
    </script>
</body>
</html>
