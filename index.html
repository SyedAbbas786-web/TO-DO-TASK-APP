<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Touch Diagnostic</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #grid-container { display: grid; width: 100vw; height: 100vh; grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(25, 1fr); }
        .tile { border: 0.1px solid #222; box-sizing: border-box; }
        .active { background: #00ff88; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); border: none; }
        #ui { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; pointer-events: none; width: 90%; }
        .stat-box { flex: 1; background: rgba(30, 30, 30, 0.9); color: white; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #444; }
        .label { font-size: 10px; text-transform: uppercase; color: #888; margin-bottom: 4px; }
        .value { font-size: 18px; font-weight: bold; }
        #reset-btn { pointer-events: auto; background: #ff4444; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="grid-container"></div>

    <div id="ui">
        <div class="stat-box">
            <div class="label">Coverage</div>
            <div id="percent" class="value">0%</div>
        </div>
        <div class="stat-box">
            <div class="label">Fingers</div>
            <div id="touch-count" class="value">0</div>
        </div>
        <button id="reset-btn" onclick="location.reload()">RESET</button>
    </div>

    <script>
        const container = document.getElementById('grid-container');
        const percentLabel = document.getElementById('percent');
        const touchLabel = document.getElementById('touch-count');
        
        // Higher density for modern screens (15x25)
        const totalTiles = 15 * 25;
        let activatedCount = 0;

        for (let i = 0; i < totalTiles; i++) {
            const tile = document.createElement('div');
            tile.classList.add('tile');
            container.appendChild(tile);
        }

        function handleTouch(e) {
            e.preventDefault();
            const touches = e.touches || [];
            touchLabel.innerText = touches.length;
            
            for (let i = 0; i < touches.length; i++) {
                const element = document.elementFromPoint(touches[i].clientX, touches[i].clientY);
                if (element && element.classList.contains('tile') && !element.classList.contains('active')) {
                    element.classList.add('active');
                    activatedCount++;
                    const score = Math.round((activatedCount / totalTiles) * 100);
                    percentLabel.innerText = score + "%";
                    if (score >= 100) percentLabel.style.color = "#00ff88";
                }
            }
        }

        container.addEventListener('touchstart', handleTouch);
        container.addEventListener('touchmove', handleTouch);
        container.addEventListener('touchend', (e) => {
            touchLabel.innerText = e.touches.length;
        });
    </script>
</body>
</html>
